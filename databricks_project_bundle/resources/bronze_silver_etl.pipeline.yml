# The main pipeline for databricks_project_bundle

resources:
  pipelines:
    bronze_silver_etl_pipeline:
      name: databricks_project_bundle_etl
      catalog: ${var.catalog}
      schema: ${var.schema}
      root_path: "../src/DLT_Pipelines/Bronze_Silver"
      serverless: true

      libraries:
        - glob:
            include: ../src/DLT_Pipelines/Bronze_Silver/transformations/**

      environment:
        dependencies:
          # We include every dependency defined by pyproject.toml by defining an editable environment
          # that points to the folder where pyproject.toml is deployed.
          - --editable ${workspace.file_path}
