# The main pipeline for databricks_project_bundle

resources:
  pipelines:
    bronze_silver_etl_pipeline:
      name: databricks_project_bundle_etl_prod
      catalog: ${var.catalog}
      schema: ${var.schema}
      root_path: "../src/DLT_Pipelines/Bronze_Silver"
      serverless: true

      libraries:
        - glob:
            include: ../src/DLT_Pipelines/Bronze_Silver/transformations/**
      continuous: false
      development: false
      photon: true
      channel: CURRENT
