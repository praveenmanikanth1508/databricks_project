# This is a Databricks asset bundle definition for databricks_project_bundle.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: databricks_project_bundle
  uuid: 740f94d7-2c83-46ff-88de-4e9e7bee43b2

include:
  - resources/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use
  warehouse_id:
    description: warehouse_Id

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-feaf1728-234e.cloud.databricks.com
    variables:
      catalog: dev_catalog
      schema: dev
      warehouse_id: a92c6bc91da948c1
    presets:
      artifacts_dynamic_version: true
  prod:
    mode: production
    workspace:
      host: https://dbc-feaf1728-234e.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/praveenkumarmanikanth439@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/praveenkumarmanikanth439@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: dev_prod
      schema: prod
      warehouse_id: a92c6bc91da948c1
    permissions:
      - user_name: praveenkumarmanikanth439@gmail.com
        level: CAN_MANAGE
